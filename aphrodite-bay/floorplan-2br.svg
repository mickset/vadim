<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="400" height="320" fill="#FFFFFF"/>
  <rect x="20" y="20" width="360" height="270" fill="none" stroke="#1B1A17" stroke-width="3"/>
  <!-- bedroom 1 -->
  <line x1="240" y1="20" x2="240" y2="160" stroke="#1B1A17" stroke-width="2"/>
  <line x1="240" y1="160" x2="380" y2="160" stroke="#1B1A17" stroke-width="2"/>
  <text x="310" y="95" text-anchor="middle" font-size="11" fill="#1B1A17" font-weight="700">Спальня 1</text>
  <!-- bedroom 2 -->
  <line x1="240" y1="160" x2="240" y2="290" stroke="#1B1A17" stroke-width="2"/>
  <text x="310" y="230" text-anchor="middle" font-size="11" fill="#1B1A17" font-weight="700">Спальня 2</text>
  <!-- bathroom -->
  <rect x="20" y="20" width="80" height="65" fill="none" stroke="#1B1A17" stroke-width="2"/>
  <text x="60" y="57" text-anchor="middle" font-size="9" fill="#5B6462">санузел</text>
  <!-- second bathroom -->
  <rect x="100" y="20" width="60" height="65" fill="none" stroke="#1B1A17" stroke-width="2"/>
  <text x="130" y="57" text-anchor="middle" font-size="8" fill="#5B6462">гардероб</text>
  <!-- balcony -->
  <rect x="20" y="290" width="360" height="18" fill="none" stroke="#1B1A17" stroke-width="2"/>
  <text x="200" y="303" text-anchor="middle" font-size="9" fill="#5B6462">терраса</text>
  <!-- kitchen counter -->
  <rect x="160" y="20" width="80" height="14" fill="#EDE8DC" stroke="#1B1A17" stroke-width="1.5"/>
  <text x="200" y="44" text-anchor="middle" font-size="8" fill="#9399A0">кухня</text>
  <text x="130" y="200" text-anchor="middle" font-size="12" fill="#1B1A17" font-weight="700">Гостиная</text>
  <!-- door swings -->
  <path d="M 240 190 A 30 30 0 0 1 270 220" fill="none" stroke="#1B1A17" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M 240 90 A 30 30 0 0 0 270 60" fill="none" stroke="#1B1A17" stroke-width="1" stroke-dasharray="3 3"/>
</svg>
