name: Deploy Aphrodite Bay to Fozzy hosting

on:
  push:
    branches:
      - main
    paths:
      - "Aphrodite Bay/**"
      - ".github/workflows/deploy-aphrodite-bay.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync over SSH
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USERNAME }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          SOURCE: "Aphrodite Bay/"
          TARGET: "public_html/vadim/aphrodite-bay/"
          # .git/.github don't need to live on the server; add more patterns
          # here (comma-separated) if you keep local-only files in the repo.
          EXCLUDE: ".git/, .github/, README.md"
          # No --delete yet: this only ever adds/updates files on the server,
          # it won't remove anything you might add manually there later.
          # Once you're confident the repo is the single source of truth,
          # add --delete to ARGS below to make it a true mirror.
          ARGS: "-avzr --exclude=.git --exclude=.github"
