name: Uptime check

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check site and API, alert via Telegram on failure
        run: |
          check() {
            url="$1"
            name="$2"
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url" || echo "000")
            if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                -d text="⚠️ $name недоступен: $url (HTTP $code)"
            fi
          }
          check "https://aphrodite-bay.dezigma.com/" "Сайт Aphrodite Bay"
          check "https://api.dezigma.com/auth/v1/health" "Supabase backend"
