<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="400" height="320" fill="#FFFFFF"/>
  <rect x="30" y="30" width="340" height="260" fill="none" stroke="#1B1A17" stroke-width="3"/>
  <!-- bathroom -->
  <rect x="30" y="30" width="90" height="80" fill="none" stroke="#1B1A17" stroke-width="2"/>
  <text x="75" y="75" text-anchor="middle" font-size="11" fill="#5B6462">санузел</text>
  <!-- balcony -->
  <rect x="30" y="270" width="340" height="20" fill="none" stroke="#1B1A17" stroke-width="2"/>
  <text x="200" y="284" text-anchor="middle" font-size="10" fill="#5B6462">балкон</text>
  <!-- kitchen counter -->
  <rect x="130" y="30" width="90" height="14" fill="#EDE8DC" stroke="#1B1A17" stroke-width="1.5"/>
  <!-- door swing -->
  <path d="M 370 150 A 40 40 0 0 1 330 190" fill="none" stroke="#1B1A17" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="370" y1="150" x2="370" y2="190" stroke="#1B1A17" stroke-width="1"/>
  <text x="230" y="200" text-anchor="middle" font-size="13" fill="#1B1A17" font-weight="700">Студия</text>
  <text x="230" y="220" text-anchor="middle" font-size="11" fill="#5B6462">кухня-гостиная-спальня</text>
  <text x="200" y="55" text-anchor="middle" font-size="9" fill="#9399A0">кухонная зона</text>
</svg>
